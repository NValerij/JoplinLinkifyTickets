name: CI

# Runs unit tests and builds the plugin on every push and pull request, so a
# broken build or a failing test is caught before it is tagged for release.
on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the plugin
        run: npm run dist

      - name: Upload the built plugin as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: publish/*.jpl
          if-no-files-found: error
